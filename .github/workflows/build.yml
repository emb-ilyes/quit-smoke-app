name: Build QuitFlow APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🗑 Clean and Prebuild Android
        run: npx expo prebuild --platform android --clean --no-install

      - name: 🛠 Fix Android Resources
        run: |
          mkdir -p android/app/src/main/res/values

          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="splashscreen_background">#0f0c1a</color>
            <color name="colorPrimary">#7c3aed</color>
            <color name="colorPrimaryDark">#5b3fa0</color>
            <color name="colorAccent">#a78bfa</color>
            <color name="activityBackground">#0f0c1a</color>
            <color name="backgroundColor">#0f0c1a</color>
            <color name="nbEntryBackground">#0f0c1a</color>
            <color name="recentBarColor">#7c3aed</color>
            <color name="textColorPrimary">#e8e0ff</color>
            <color name="textColorSecondary">#9880cc</color>
            <color name="statusBarColor">#0f0c1a</color>
            <color name="navigationBarColor">#0f0c1a</color>
            <color name="iconBackgroundColor">#0f0c1a</color>
          </resources>
          EOF

          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
              <item name="android:editTextBackground">@android:color/transparent</item>
              <item name="colorPrimary">@color/colorPrimary</item>
              <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
              <item name="colorAccent">@color/colorAccent</item>
              <item name="android:windowBackground">@color/activityBackground</item>
              <item name="android:statusBarColor">@color/statusBarColor</item>
              <item name="android:navigationBarColor">@color/navigationBarColor</item>
            </style>
            <style name="Theme.App.SplashScreen" parent="AppTheme">
              <item name="android:windowBackground">@drawable/splashscreen</item>
            </style>
          </resources>
          EOF

      - name: 📦 Bundle JavaScript into Android assets
        # This is the step that was missing — Gradle needs the JS bundle
        # pre-built in assets/ or it ships an empty APK that crashes on launch
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file node_modules/expo/AppEntry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: 🔑 Make Gradle Executable
        run: chmod +x android/gradlew

      - name: 🤖 Build Debug APK
        run: |
          cd android
          # BUNDLE_SKIP tells the Gradle task not to re-run the bundler
          # since we already built the bundle in the previous step
          ./gradlew assembleDebug \
            -x bundleReleaseJsAndAssets \
            -Pbundler.skip=true \
            --no-daemon \
            --stacktrace

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuitFlow-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
